  <text x="848" y="665" fill="#FFFDF8" font-family="Hiragino Sans GB, PingFang SC, sans-serif" font-size="22">语音输入后的</text>
  <text x="848" y="697" fill="#FFFDF8" font-family="Hiragino Sans GB, PingFang SC, sans-serif" font-size="22">内容整理器</text>
