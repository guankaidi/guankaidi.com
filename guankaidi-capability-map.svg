  <text x="132" y="665" fill="#5D6458" font-family="Hiragino Sans GB, PingFang SC, sans-serif" font-size="22">不承诺爆款、稳赚</text>
  <text x="132" y="697" fill="#5D6458" font-family="Hiragino Sans GB, PingFang SC, sans-serif" font-size="22">把个案和事实分清楚</text>
